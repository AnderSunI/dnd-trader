<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Trader — Помощник ГМ</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="mode-switch" id="modeSwitch">👤 Игрок</div>
    <h1>🏪 D&D Trader — Помощник ГМ</h1>

    <div id="authContainer" class="auth-container" style="display: none;">
        <div class="auth-form">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="doLogin" class="primary">Войти</button>
            <button id="doRegister" class="success">Регистрация</button>
        </div>
        <div><button id="logoutBtn" class="danger" style="display: none;">Выйти</button></div>
    </div>

    <div id="guestWarning" class="guest-warning" style="display: none;">
        <span>⚠️ Вы не авторизованы. Ваши данные могут быть потеряны.</span>
        <button id="showAuthBtn" class="primary">Войти / Зарегистрироваться</button>
    </div>

    <div class="cart-widget" id="cartWidget">
        <div class="cart-info">
            🪙 Ваше золото: <input type="number" id="playerGoldInput" value="1000" step="100" min="0">
            🛒 Корзина: <span id="cartCount">0</span> товаров, <span id="cartTotal">0з</span>
        </div>
        <div class="cart-buttons">
            <button id="viewCartBtn" class="primary">Корзина</button>
            <button id="clearCartBtn" class="danger">Очистить</button>
            <button id="updateGoldBtn" class="primary">Обновить</button>
            <button id="cabinetBtn" class="primary">Личный кабинет</button>
        </div>
    </div>
    <div class="cart-widget"><div class="cart-info">🎒 Инвентарь: <span id="inventoryCount">0</span></div><button id="viewInventoryBtn">Инвентарь</button></div>

    <div class="filters-panel" id="filtersPanel"></div>
    <div id="tradersGrid" class="traders-grid"></div>
    <footer>...</footer>

    <!-- Модалки -->
    <div id="traderModal" class="modal"><div class="modal-content"><span class="close">&times;</span><div id="modalContent"></div></div></div>
    <div id="cartModal" class="modal"><div class="modal-content"><span class="close">&times;</span><div id="cartModalContent"></div></div></div>
    <div id="inventoryModal" class="modal"><div class="modal-content"><span class="close">&times;</span><div id="inventoryModalContent"></div></div></div>
    <div id="cabinetModal" class="modal"><div class="modal-content"><span class="close">&times;</span><div id="cabinetModalContent"></div></div></div>
    <div id="toast" class="toast"></div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
