services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: traderpass
      POSTGRES_DB: dnd_trader
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d dnd_trader"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://trader:traderpass@db:5432/dnd_trader
      SECRET_KEY: supersecretkeychangeinproduction
    volumes:
      - ./app:/app/app
      - ./frontend:/app/frontend
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata: